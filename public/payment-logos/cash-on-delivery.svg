<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 48" width="150" height="48">
  <rect width="150" height="48" rx="8" fill="#1E3A5F"/>
  <!-- Cash/delivery icon: box with dollar sign -->
  <rect x="10" y="14" width="22" height="20" rx="3" fill="none" stroke="#FFFFFF" stroke-width="2"/>
  <line x1="10" y1="21" x2="32" y2="21" stroke="#FFFFFF" stroke-width="2"/>
  <text x="18" y="33" font-family="Arial,sans-serif" font-size="9" font-weight="900" fill="#F5C000">$</text>
  <!-- Text -->
  <text x="40" y="20" font-family="'Arial Black',Arial,sans-serif" font-size="9" font-weight="900" fill="#FFFFFF" letter-spacing="0.5">Cash on</text>
  <text x="40" y="34" font-family="'Arial Black',Arial,sans-serif" font-size="9" font-weight="900" fill="#FFFFFF" letter-spacing="0.5">Delivery</text>
</svg>
