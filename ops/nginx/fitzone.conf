limit_req_zone $binary_remote_addr zone=fitzone_api:10m rate=10r/s;
limit_conn_zone $binary_remote_addr zone=fitzone_conn:10m;

server {
    listen 80;
    listen [::]:80;
    server_name fitzoneland.com www.fitzoneland.com;

    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fitzoneland.com www.fitzoneland.com;

    ssl_certificate /etc/letsencrypt/live/fitzoneland.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fitzoneland.com/privkey.pem;
    ssl_session_timeout 1d;
    ssl_session_cache shared:FitZoneSSL:10m;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    server_tokens off;
    client_max_body_size 200m;
    keepalive_timeout 20;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(self), payment=(self)" always;
    add_header Strict-Transport-Security "max-age=15552000" always;

    access_log /var/log/nginx/fitzone.access.log;
    error_log /var/log/nginx/fitzone.error.log warn;

    location /api/ {
        limit_req zone=fitzone_api burst=30 nodelay;
        limit_conn fitzone_conn 20;

        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }

    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 60s;
    }
}
